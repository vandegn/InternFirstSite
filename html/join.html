<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - InternFirst</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f6f9ee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-container {
            background: #fff;
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 560px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo img {
            height: 40px;
        }

        .auth-container h1 {
            font-size: 32px;
            font-weight: 900;
            color: #0f172a;
            text-align: center;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            text-align: center;
            font-size: 14px;
            color: #667085;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: none;
            border-bottom: 2px solid rgba(15, 23, 42, 0.12);
            font-size: 14px;
            font-family: inherit;
            color: #0f172a;
            background: transparent;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-bottom-color: #8fb100;
        }

        .form-group input::placeholder {
            color: #94a3b8;
        }

        .form-row-between {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #8fb100;
            cursor: pointer;
        }

        .remember-me label {
            font-size: 13px;
            color: #667085;
            cursor: pointer;
        }

        .forgot-link {
            font-size: 13px;
            color: #8fb100;
            text-decoration: none;
            font-weight: 600;
        }

        .btn-auth {
            display: block;
            width: 100%;
            padding: 14px 18px;
            background: linear-gradient(135deg, #8fb100, #7a9800);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 10px 22px rgba(143, 177, 0, 0.22);
            transition: transform 0.15s, box-shadow 0.15s;
            margin-bottom: 24px;
        }

        .btn-auth:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 28px rgba(143, 177, 0, 0.3);
        }

        .btn-auth:active {
            transform: translateY(1px);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(15, 23, 42, 0.12);
        }

        .divider span {
            font-size: 12px;
            color: #94a3b8;
            font-weight: 600;
        }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 13px 18px;
            background: #fff;
            color: #0f172a;
            font-size: 14px;
            font-weight: 600;
            border: 2px solid rgba(15, 23, 42, 0.12);
            border-radius: 999px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s, border-color 0.2s;
        }

        .btn-google:hover {
            background: #f8fafc;
            border-color: rgba(15, 23, 42, 0.2);
        }

        .btn-google svg {
            width: 18px;
            height: 18px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #667085;
        }

        .auth-footer a {
            color: #8fb100;
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 520px) {
            .auth-container {
                padding: 32px 20px;
            }
            .auth-container h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-logo">
        <a href="index.html"><img src="https://internfirst-demo.com/wp-content/uploads/2026/02/Top-Rated-2.png" alt="InternFirst"></a>
    </div>
    <h1>Login</h1>
    <p class="auth-subtitle">Welcome back. Please enter your details to continue.</p>

    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <div class="form-row-between">
            <div class="remember-me">
                <input type="checkbox" id="remember">
                <label for="remember">Remember me</label>
            </div>
            <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-auth">Sign In</button>
    </form>

    <div class="divider"><span>OR</span></div>

    <button class="btn-google">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
    </button>

    <p class="auth-footer">Don't have an account? <a href="register.html">Create one</a></p>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    alert('Signed in successfully! (Demo)');
});
</script>
</body>
</html>
