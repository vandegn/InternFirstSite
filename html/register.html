<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - InternFirst</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f6f9ee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-container {
            background: #fff;
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 680px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo img {
            height: 40px;
        }

        .auth-container h1 {
            font-size: 32px;
            font-weight: 900;
            color: #0f172a;
            text-align: center;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            text-align: center;
            font-size: 14px;
            color: #667085;
            margin-bottom: 32px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select {
            padding: 12px 14px;
            border: none;
            border-bottom: 2px solid rgba(15, 23, 42, 0.12);
            font-size: 14px;
            font-family: inherit;
            color: #0f172a;
            background: transparent;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-bottom-color: #8fb100;
        }

        .form-group input::placeholder {
            color: #94a3b8;
        }

        .form-group select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 14px center;
            padding-right: 36px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 24px;
            margin-bottom: 28px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #8fb100;
            cursor: pointer;
        }

        .checkbox-group label {
            font-size: 13px;
            color: #667085;
            cursor: pointer;
        }

        .checkbox-group a {
            color: #8fb100;
            text-decoration: none;
            font-weight: 600;
        }

        .btn-auth {
            display: block;
            width: 100%;
            padding: 14px 18px;
            background: linear-gradient(135deg, #8fb100, #7a9800);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 10px 22px rgba(143, 177, 0, 0.22);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .btn-auth:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 28px rgba(143, 177, 0, 0.3);
        }

        .btn-auth:active {
            transform: translateY(1px);
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #667085;
        }

        .auth-footer a {
            color: #8fb100;
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 520px) {
            .auth-container {
                padding: 32px 20px;
            }
            .auth-container h1 {
                font-size: 28px;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-logo">
        <a href="index.html"><img src="https://internfirst-demo.com/wp-content/uploads/2026/02/Top-Rated-2.png" alt="InternFirst"></a>
    </div>
    <h1>Register</h1>
    <p class="auth-subtitle">Create your account. It only takes a minute.</p>

    <form id="registerForm">
        <div class="form-grid">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="+1 (555) 000-0000">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="john@university.edu" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
            </div>
            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender">
                    <option value="" disabled selected>Select gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="non-binary">Non-binary</option>
                    <option value="prefer-not">Prefer not to say</option>
                </select>
            </div>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="terms" required>
            <label for="terms">I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a></label>
        </div>

        <button type="submit" class="btn-auth">Create Account</button>
    </form>

    <p class="auth-footer">Already have an account? <a href="join.html">Sign in</a></p>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const pw = document.getElementById('password').value;
    const cpw = document.getElementById('confirmPassword').value;
    if (pw !== cpw) {
        alert('Passwords do not match!');
        return;
    }
    alert('Account created successfully! (Demo)');
});
</script>
</body>
</html>
